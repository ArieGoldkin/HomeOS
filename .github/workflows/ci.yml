name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    defaults:
      run:
        # The pnpm workspace lives under platform/ (repo root stays clean).
        working-directory: platform
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Single source of truth: platform/.node-version (also read by Railway/Nixpacks).
          # Node 24 is required — node:sqlite is flag-free here (22.x still needs
          # --experimental-sqlite, which Vitest workers wouldn't pick up).
          node-version-file: platform/.node-version
          cache: pnpm
          cache-dependency-path: platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
